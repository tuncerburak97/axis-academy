# deploy/nginx/axisakademi.bootstrap.conf — İLK KURULUM (SSL öncesi, geçici)
# Sertifika alındıktan sonra axisakademi.conf ile değiştirin.
#
#   sudo cp deploy/nginx/axisakademi.bootstrap.conf /etc/nginx/sites-available/axisakademi.com
#   sudo ln -sf /etc/nginx/sites-available/axisakademi.com /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot certonly --webroot -w /var/www/certbot -d axisakademi.com -d www.axisakademi.com
#   sudo cp deploy/nginx/axisakademi.conf /etc/nginx/sites-available/axisakademi.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name axisakademi.com www.axisakademi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
