# deploy/nginx/axisakademi.conf — axisakademi.com production reverse proxy
# Docker app: http://127.0.0.1:5000
#
# Kurulum (Ubuntu/Debian):
#   sudo apt update && sudo apt install -y nginx certbot python3-certbot-nginx
#   sudo cp deploy/nginx/axisakademi.conf /etc/nginx/sites-available/axisakademi.com
#   sudo ln -sf /etc/nginx/sites-available/axisakademi.com /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d axisakademi.com -d www.axisakademi.com
#   sudo nginx -t && sudo systemctl reload nginx

# www ve HTTP → https://axisakademi.com
server {
    listen 80;
    listen [::]:80;
    server_name axisakademi.com www.axisakademi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://axisakademi.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.axisakademi.com;

    ssl_certificate     /etc/letsencrypt/live/axisakademi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/axisakademi.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://axisakademi.com$request_uri;
}

# Ana site — HTTPS → Docker (port 5000)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name axisakademi.com;

    ssl_certificate     /etc/letsencrypt/live/axisakademi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/axisakademi.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload limit (talep dosyaları için)
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# http bloğuna ekle (genelde /etc/nginx/nginx.conf içinde, http { } altına):
#
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
